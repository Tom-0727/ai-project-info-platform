<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Project Scout</title>
    <meta
      name="description"
      content="持续整理中国市场内具备明确变现路径的 AI Project，每日新增与更新统一汇总。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">AI Project Scout</p>
          <h1>每天只看真正有变现路径的新 AI Project</h1>
          <p class="hero-text">
            聚焦中国市场，记录项目名称、产品形态、目标客群、痛点、变现模式、技术与合规门槛，并对每日新增做去重整理。
          </p>
        </div>
        <div class="hero-metrics" id="hero-metrics"></div>
      </header>

      <main class="layout">
        <section class="panel panel-main">
          <div class="panel-heading">
            <div>
              <p class="panel-label">Daily Feed</p>
              <h2>每日新增与更新</h2>
            </div>
            <p class="panel-hint">每张卡片只保留可读摘要，点击后在右侧查看完整详情。</p>
          </div>
          <div class="filters">
            <label class="filter-field">
              <span>搜索项目</span>
              <input id="search-input" type="search" placeholder="输入项目名、别名、对标或客群关键词" />
            </label>
            <label class="filter-field">
              <span>证据等级</span>
              <select id="evidence-filter">
                <option value="all">全部</option>
                <option value="strong">强证据</option>
                <option value="medium">中证据</option>
                <option value="weak">弱证据</option>
              </select>
            </label>
            <label class="filter-field">
              <span>产品形态</span>
              <select id="form-filter">
                <option value="all">全部</option>
              </select>
            </label>
            <label class="filter-field">
              <span>排序方式</span>
              <select id="sort-filter">
                <option value="discovered">最新挖掘优先</option>
                <option value="evidence">证据强度优先</option>
                <option value="name">名称 A-Z</option>
              </select>
            </label>
          </div>
          <div id="summary-strip" class="summary-strip" aria-label="样本结构摘要"></div>
          <p class="results-hint" id="results-hint"></p>
          <div id="daily-feed" class="daily-feed"></div>
        </section>

        <aside class="panel panel-side panel-sticky">
          <div class="panel-heading">
            <div>
              <p class="panel-label">Project Detail</p>
              <h2>项目详情</h2>
            </div>
            <p class="panel-hint">默认展示当前选中的最新项目。</p>
          </div>
          <div id="detail-empty" class="detail-empty">在左侧点击任一项目卡片，右侧会展开完整信息。</div>
          <div id="detail-view" class="detail-view" hidden></div>
        </aside>
      </main>
    </div>

    <template id="metric-template">
      <article class="metric-card">
        <span class="metric-value"></span>
        <span class="metric-label"></span>
      </article>
    </template>

    <template id="day-template">
      <article class="day-card">
        <div class="day-header">
          <div>
            <p class="day-date"></p>
            <h3 class="day-title"></h3>
          </div>
          <span class="day-count"></span>
        </div>
        <div class="day-items"></div>
      </article>
    </template>

    <template id="feed-item-template">
      <button class="feed-item feed-card" type="button">
        <div class="feed-item-top">
          <div>
            <p class="feed-type"></p>
            <h4 class="feed-name"></h4>
          </div>
          <span class="feed-tag"></span>
        </div>
        <p class="feed-summary"></p>
        <div class="feed-meta"></div>
      </button>
    </template>

    <template id="detail-template">
      <article class="detail-card">
        <div class="project-top">
          <div>
            <p class="project-form"></p>
            <h3 class="project-name"></h3>
          </div>
          <span class="project-status"></span>
        </div>
        <p class="detail-intro"></p>
        <div class="detail-note"></div>
        <dl class="project-detail-list"></dl>
        <div class="source-links"></div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
